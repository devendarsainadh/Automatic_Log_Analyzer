<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Log Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h1 class="display-5 fw-bold text-primary">AI Log Analyzer</h1>
                        <p class="text-muted">Upload a log file and let AI highlight WARN and ERROR insights.</p>
                    </div>

                    <div class="upload-box border rounded-4 p-4 text-center mb-4" id="dropZone">
                        <input class="d-none" id="fileInput" type="file" accept=".log,.txt" />
                        <p class="mb-2 fw-semibold">Drag & drop your log file here</p>
                        <p class="text-muted mb-3">Supported files: .log, .txt</p>
                        <button class="btn btn-outline-primary" id="browseBtn" type="button">Choose File</button>
                        <div class="mt-3 small text-muted" id="selectedFileName">No file selected</div>
                    </div>

                    <div class="d-flex justify-content-center mb-4">
                        <button class="btn btn-primary btn-lg px-4" id="analyzeBtn" type="button">Analyze Logs</button>
                    </div>

                    <div class="text-center mb-4 d-none" id="loadingSpinner">
                        <div class="spinner-border text-primary" role="status"></div>
                        <div class="mt-2 text-muted">Analyzing logs with AI...</div>
                    </div>

                    <div id="alertBox"></div>

                    <div class="mb-4 d-none" id="summarySection">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="card border-0 bg-light rounded-3 h-100">
                                    <div class="card-body">
                                        <div class="text-muted small">Total Logs</div>
                                        <div class="fs-3 fw-bold" id="totalLogs">0</div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card border-0 bg-light rounded-3 h-100">
                                    <div class="card-body">
                                        <div class="text-muted small">Analyzed Logs</div>
                                        <div class="fs-3 fw-bold" id="analyzedLogs">0</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="resultsSection"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
